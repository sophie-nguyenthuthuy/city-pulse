name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Check import hygiene
        run: |
          python -c "from src.data.loader import load_pipeline; print('loader OK')"
          python -c "from src.models.clustering import run_kmeans; print('clustering OK')"
          python -c "from src.models.regression import train_model; print('regression OK')"
          python -c "from src.visualization.eda_plots import overview; print('eda_plots OK')"
